<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">My Game List</title>
  <desc id="desc">Organiza tu coleccion de videojuegos y sincronizala con GitHub Gist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="140" r="160" fill="#ffffff" fill-opacity="0.07"/>
  <circle cx="1120" cy="480" r="220" fill="#ffffff" fill-opacity="0.06"/>

  <g transform="translate(90 110)">
    <rect x="0" y="0" width="140" height="140" rx="26" fill="#0b1220" stroke="#60a5fa" stroke-width="4"/>
    <ellipse cx="50" cy="70" rx="22" ry="44" fill="none" stroke="#1a9fff" stroke-width="10"/>
    <ellipse cx="90" cy="70" rx="22" ry="44" fill="none" stroke="#e5b143" stroke-width="10"/>
  </g>

  <text x="90" y="340" fill="#ffffff" font-family="DM Sans, Segoe UI, Arial, sans-serif" font-size="84" font-weight="800">
    My Game List
  </text>
  <text x="90" y="420" fill="#e2e8f0" font-family="DM Sans, Segoe UI, Arial, sans-serif" font-size="42" font-weight="500">
    Organiza, puntua y sincroniza tu coleccion de videojuegos
  </text>
</svg>
