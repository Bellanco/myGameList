<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1e24">
  <title>Mis Listas de juegos</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cellipse cx='10' cy='16' rx='6' ry='12' fill='none' stroke='%231a9fff' stroke-width='3'/%3E%3Cellipse cx='22' cy='16' rx='6' ry='12' fill='none' stroke='%23e5b143' stroke-width='3'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <svg aria-hidden="true" class="svg-sprite">
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M11 5h2v14h-2zM5 11h14v2H5z" />
    </symbol>
    <symbol id="icon-download" viewBox="0 0 24 24">
      <path d="M5 20h14v-2H5v2zm7-18v10.17l3.59-3.58L17 10l-5 5-5-5 1.41-1.41L11 12.17V2h1z" />
    </symbol>
    <symbol id="icon-upload" viewBox="0 0 24 24">
      <path d="M5 20h14v-2H5v2zm7-18 5 5-1.41 1.41L13 5.83V16h-2V5.83L8.41 8.41 7 7l5-5z" />
    </symbol>
    <symbol id="icon-gear" viewBox="0 0 24 24">

        d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41L9.25 5.35c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.11.2-.06.47.12.61l2.03 1.58c-.04.3-.06.61-.06.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.11-.2.06-.47-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z" />
    </symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24">
      <path
        d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm14.71-9.21 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 00-1.41 0l-1.83 1.83 3.75 3.75z" />
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path
        d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm3.5-9h1.5v8H9.5v-8zm3.5 0h1.5v8H13v-8zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path
        d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3 1.4 1.4z" />
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24">
      <path d="M13 5l7 7-7 7-1.41-1.41L16.17 13H4v-2h12.17l-4.58-4.59z" />
    </symbol>
    <symbol id="icon-cloud-sync" viewBox="0 0 24 24">
      <path
        d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z" />
    </symbol>
    <symbol id="icon-refresh" viewBox="0 0 24 24">
      <path
        d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
    </symbol>
    <symbol id="icon-filter" viewBox="0 0 24 24">
      <path d="M3 5h18l-7 8v5l-4 2v-7L3 5z" />
    </symbol>
    <symbol id="icon-filter-active" viewBox="0 0 24 24">
      <path d="M3 5h18l-7 8v5l-4 2v-7L3 5z" />
      <circle cx="18.2" cy="6.2" r="2.1" />
    </symbol>
    <symbol id="icon-steamdeck" viewBox="0 0 24 24">
      <path d="M6 6h12a4 4 0 0 1 4 4v4a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-4a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2H6z" />
      <rect x="8" y="9" width="8" height="6" rx="1.25" />
      <circle cx="6.35" cy="12" r="1.15" />
      <circle cx="17.65" cy="12" r="1.15" />
      <circle cx="19.4" cy="10.8" r="0.55" />
      <circle cx="19.4" cy="13.2" r="0.55" />
    </symbol>
    <symbol id="icon-repeat" viewBox="0 0 24 24">
      <path
        d="M7 7h10V4l5 4-5 4V9H7a3 3 0 00-3 3v1H2v-1a5 5 0 015-5zm10 10H7v3l-5-4 5-4v3h10a3 3 0 003-3v-1h2v1a5 5 0 01-5 5z" />
    </symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24">
      <path d="M12 5a8 8 0 00-8 8H1l4 4 4-4H6a6 6 0 116 6v2a8 8 0 000-16z" />
    </symbol>
    <symbol id="icon-device" viewBox="0 0 24 24">
      <path d="M6 3h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2zm0 4v11h12V7H6zm5 12h2v1h-2v-1z" />
    </symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24">
      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
    </symbol>
    <symbol id="icon-eye-off" viewBox="0 0 24 24">
      <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 2.99-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 11.5c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2z" />
    </symbol>
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
    </symbol>
    <symbol id="icon-lock" viewBox="0 0 24 24">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5s-5 2.24-5 5v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
    </symbol>
  </svg>

  <header class="app-header">
    <div class="header-left">
      <div class="app-title">Mis Listas</div>
      <div id="sync-badge" class="sync-badge s-idle" data-action="open-sync" title="Configurar sincronización">
        <span class="sync-dot"></span><span id="sync-label">No Sincronizado</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" type="button" data-action="export-data">
        <svg class="ui-icon" aria-hidden="true">
          <use href="#icon-download"></use>
        </svg><span>Exportar</span>
      </button>
      <label class="btn btn-secondary">
        <svg class="ui-icon" aria-hidden="true">
          <use href="#icon-upload"></use>
        </svg><span>Importar</span>
        <input type="file" accept=".json" class="input-hidden" data-action="import-data" data-event="change">
      </label>
      <button class="btn btn-secondary" type="button" data-action="open-sync" title="Sincronización con Gist">
        <svg class="ui-icon" aria-hidden="true">
          <use href="#icon-cloud-sync"></use>
        </svg><span>Sincronización</span>
      </button>
      <button class="btn btn-secondary" type="button" data-action="open-admin" title="Administrar filtros">
        <svg class="ui-icon" aria-hidden="true">
          <use href="#icon-gear"></use>
        </svg><span>Ajustes</span>
      </button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-c" type="button" data-action="switch-tab" data-tab="c">Lista del completista
      <span class="count-badge" id="cnt-c">0</span></button>
    <button class="tab-btn" id="tab-v" type="button" data-action="switch-tab" data-tab="v">Lista de la vergüenza <span
        class="count-badge" id="cnt-v">0</span></button>
    <button class="tab-btn" id="tab-e" type="button" data-action="switch-tab" data-tab="e">En curso <span
        class="count-badge" id="cnt-e">0</span></button>
    <button class="tab-btn" id="tab-p" type="button" data-action="switch-tab" data-tab="p">Lista de próximos <span
        class="count-badge" id="cnt-p">0</span></button>
  </div>

  <div class="status-banner" id="status-banner" hidden></div>

  <main class="main">
    <div class="toolbar" id="toolbar"></div>
    <div class="table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-ov" id="modal-form">
    <div class="modal">
      <div class="modal-hd">
        <div class="modal-title" id="m-title">Nuevo juego</div>
        <button class="btn-icon" type="button" aria-label="Cerrar" data-action="close-modal" data-target="modal-form">
          <svg class="ui-icon" aria-hidden="true">
            <use href="#icon-close"></use>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="m-body"></div>
      <div class="modal-ft">
        <button class="btn btn-secondary" type="button" data-action="close-modal"
          data-target="modal-form">Cancelar</button>
        <button class="btn btn-steam" type="button" data-action="save-game">Guardar</button>
      </div>
    </div>
  </div>

  <div class="modal-ov" id="modal-admin">
    <div class="modal">
      <div class="modal-hd">
        <div class="modal-title">Administración de filtros</div>
        <button class="btn-icon" type="button" aria-label="Cerrar" data-action="close-modal" data-target="modal-admin">
          <svg class="ui-icon" aria-hidden="true">
            <use href="#icon-close"></use>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="admin-tabs">
          <button class="tab-btn active admin-tab" type="button" data-action="switch-admin-tab"
            data-admin="genres">Géneros</button>
          <button class="tab-btn         admin-tab" type="button" data-action="switch-admin-tab"
            data-admin="platforms">Plataformas</button>
          <button class="tab-btn         admin-tab" type="button" data-action="switch-admin-tab"
            data-admin="strengths">Puntos fuertes</button>
          <button class="tab-btn         admin-tab" type="button" data-action="switch-admin-tab"
            data-admin="weaknesses">Puntos débiles / razón</button>
        </div>
        <div id="admin-warning" class="admin-warning" role="status" aria-live="polite"></div>
        <div id="admin-list-container" class="fg"></div>
      </div>
    </div>
  </div>

  <div class="modal-ov" id="modal-sync">
    <div class="modal modal--sm">
      <div class="modal-hd">
        <div class="modal-title">Sincronización — GitHub Gist</div>
        <button class="btn-icon" type="button" aria-label="Cerrar" data-action="close-modal" data-target="modal-sync">
          <svg class="ui-icon" aria-hidden="true">
            <use href="#icon-close"></use>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="sync-body"></div>
      <div class="modal-ft" id="sync-footer"></div>
    </div>
  </div>

  <button class="fab" type="button" aria-label="Añadir juego" data-action="open-add-modal">
    <svg aria-hidden="true">
      <use href="#icon-plus"></use>
    </svg>
  </button>

  <datalist id="dl-genres"></datalist>
  <datalist id="dl-platforms"></datalist>
  <datalist id="dl-strengths"></datalist>
  <datalist id="dl-weaknesses"></datalist>

  <dialog id="confirm-dialog" class="alert-dialog" data-type="delete">
    <div class="dialog-content">
      <div class="dialog-title" id="dialog-title">¿Continuar?</div>
      <div class="dialog-actions">
        <button class="btn btn-secondary" type="button" id="dialog-cancel">Cancelar</button>
        <button class="btn" type="button" id="dialog-confirm">Aceptar</button>
      </div>
    </div>
  </dialog>

  <!-- Vite entry point -->
  <script type="module" src="ts/main.ts"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('[PWA] Service Worker registered', reg))
        .catch(err => console.warn('[PWA] Service Worker registration failed', err));
    }
  </script>
</body>

</html>
