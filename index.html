<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1e24">
    <!-- F1: aplica el tema guardado antes de pintar (evita el flash). 'self' → permitido por la CSP. -->
    <script src="/theme-init.js"></script>
    <meta name="description" content="Organiza, puntúa y sincroniza tu colección de videojuegos.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="My Game List">
    <meta property="og:title" content="My Game List">
    <meta property="og:description" content="Organiza, puntúa y sincroniza tu colección de videojuegos.">
    <meta property="og:image" content="/share-card.svg">
    <meta property="og:image:type" content="image/svg+xml">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Game List">
    <meta name="twitter:description" content="Organiza, puntúa y sincroniza tu colección de videojuegos.">
    <meta name="twitter:image" content="/share-card.svg">
    <title>Mis Listas de juegos</title>
    <!-- Iconos como archivos reales (no data: URI): así Firefox y Chromium los usan de forma
         fiable en pestaña, marcadores, historial y página de inicio, en escritorio y móvil.
         El .ico va primero: superficies como la barra de favoritos y los accesos directos
         piden /favicon.ico de forma implícita; sin él, Chromium/Edge muestran la letra del título. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
