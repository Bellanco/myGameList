<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1e24">
    <!-- F1: aplica el tema/paleta guardados ANTES del primer render (evita el flash). Inline para
         ahorrar una petición bloqueante en la ruta crítica. Al no ser 'self' externo, la CSP lo
         admite por hash SHA-256: si tocas este bloque, recalcula el hash en `public/_headers`
         (script-src 'sha256-...'). Mantén claves/colores en sincronía con storageKeys/palettes/_base.scss. -->
    <script>(function () {
  var BG = {
    steam: { dark: '#1a1e24', light: '#f0e9db' },
    persona: { dark: '#0d0d0d', light: '#f4f1ee' },
    portal: { dark: '#12171b', light: '#e7ecf0' },
    cyberpunk: { dark: '#08090d', light: '#e7eaee' },
    cuphead: { dark: '#1c1209', light: '#eddcac' },
    grimdark: { dark: '#060b08', light: '#e4e2d4' }
  };
  try {
    var pref = localStorage.getItem('mis-listas-theme');
    var theme = pref === 'light' ? 'light'
      : pref === 'dark' ? 'dark'
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    var palette = localStorage.getItem('mis-listas-palette');
    if (!BG[palette]) {
      palette = 'steam';
    }
    if (palette !== 'steam') {
      document.documentElement.setAttribute('data-palette', palette);
    }
    if (localStorage.getItem('mis-listas-uppercase') === 'on') {
      document.documentElement.setAttribute('data-uppercase', 'on');
    }
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) {
      meta.setAttribute('content', BG[palette][theme]);
    }
  } catch (e) {}
})();</script>
    <meta name="description" content="Organiza, puntúa y sincroniza tu colección de videojuegos.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="My Game List">
    <meta property="og:title" content="My Game List">
    <meta property="og:description" content="Organiza, puntúa y sincroniza tu colección de videojuegos.">
    <meta property="og:image" content="/share-card.svg">
    <meta property="og:image:type" content="image/svg+xml">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Game List">
    <meta name="twitter:description" content="Organiza, puntúa y sincroniza tu colección de videojuegos.">
    <meta name="twitter:image" content="/share-card.svg">
    <title>Mis Listas de juegos</title>
    <!-- Iconos como archivos reales (no data: URI): así Firefox y Chromium los usan de forma
         fiable en pestaña, marcadores, historial y página de inicio, en escritorio y móvil.
         El .ico va primero: superficies como la barra de favoritos y los accesos directos
         piden /favicon.ico de forma implícita; sin él, Chromium/Edge muestran la letra del título. -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="32x32">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2">
    <link rel="apple-touch-icon" href="/icon-192.png?v=2">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Solo DM Sans (tipografía base de todos los temas) en la ruta crítica. Las fuentes propias de cada
         paleta (Oswald/Saira/Rajdhani/Cuphead/grimdark…) las carga el skin de su paleta vía @import, así que
         no bloquean el arranque de quien usa la paleta por defecto. Ver src/styles/themes/*.scss. -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
